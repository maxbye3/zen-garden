<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Seigaiha Waves</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #56a3dc;
    }
    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      z-index: 0;
    }
    #white-fade {
      position: fixed;
      inset: 0;
      background: #ffffff;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: pre-reveal 0.9s ease-out forwards;
    }
    body.started #white-fade {
      animation: reveal-waves 1.65s ease-in-out 0.18s forwards;
    }
    @keyframes pre-reveal {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }
    /* Canvas replaces SVG for the torii tunnel — no DOM reordering needed */
    #torii-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }
    body.arrived #torii-canvas {
      animation: tunnel-fade 0.28s ease-out forwards;
    }
    #start-prompt {
      position: fixed;
      left: 50%;
      top: calc(50% + 205px);
      z-index: 6;
      min-height: 46px;
      padding: 0 22px;
      border: 1px solid rgba(166, 42, 24, 0.34);
      border-radius: 999px;
      background: rgba(255, 251, 238, 0.92);
      color: #2c2c26;
      font: 900 1rem/1 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.02em;
      box-shadow:
        0 12px 28px rgba(7, 31, 48, 0.18),
        0 0 0 5px rgba(255, 251, 238, 0.2);
      transform: translateX(-50%);
      cursor: pointer;
      transition:
        opacity 180ms ease,
        transform 180ms ease;
    }
    body.started #start-prompt {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(8px);
    }
    #back-to-garden2 {
      position: fixed;
      left: 50%;
      top: calc(50% + 262px);
      z-index: 6;
      min-height: 38px;
      padding: 0 18px;
      border: 1px solid rgba(166, 42, 24, 0.22);
      border-radius: 999px;
      background: rgba(255, 251, 238, 0.6);
      color: #2c2c26;
      font: 700 0.82rem/1 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.02em;
      box-shadow: 0 6px 16px rgba(7, 31, 48, 0.12);
      transform: translateX(-50%);
      cursor: pointer;
      transition:
        opacity 180ms ease,
        transform 180ms ease;
    }
    #back-to-garden2 {
      display: block;
    }
    body.started #back-to-garden2 {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(8px);
    }
    .wave .ov {
      opacity: 0;
      transition: opacity 1.5s ease;
      pointer-events: none;
    }
    .wave.is-hit .ov {
      opacity: 1;
      transition: opacity 0.2s ease;
    }
    #sheet {
      animation: pattern-scroll var(--scroll-duration, 42s) linear infinite;
    }
    .wave {
      animation: wave-bob var(--bob-duration, 3.8s) ease-in-out infinite;
      animation-delay: var(--bob-delay, 0s);
      transform-box: fill-box;
      transform-origin: center;
    }
    @keyframes pattern-scroll {
      from { transform: translate(0, 0); }
      to   { transform: translate(var(--scroll-x), var(--scroll-y)); }
    }
    @keyframes wave-bob {
      0%, 100% { transform: translateY(-3px); }
      50%       { transform: translateY(3px); }
    }
    @keyframes reveal-waves {
      0%, 12% { opacity: 1; }
      68%, 100% { opacity: 0; }
    }
    @keyframes tunnel-fade {
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <svg id="stage" xmlns="http://www.w3.org/2000/svg"></svg>
  <div id="white-fade"></div>
  <canvas id="torii-canvas" aria-hidden="true"></canvas>
  <button id="start-prompt" type="button">Click to start</button>
  <button id="back-to-garden2" type="button">go back to garden 2</button>
  <script>
    (function () {
      const SVG_NS = "http://www.w3.org/2000/svg";
      const stage = document.getElementById("stage");
      const startPrompt = document.getElementById("start-prompt");

      const BLUE  = "#56a3dc";
      const WHITE = "#ffffff";
      const TAN   = "#efce9f";
      const RED   = "#e8322f";

      const RINGED_BLUE = [
        [1.00, WHITE], [0.92, BLUE],
        [0.79, WHITE], [0.71, BLUE],
        [0.58, WHITE], [0.50, BLUE],
        [0.37, WHITE], [0.29, BLUE],
        [0.16, WHITE], [0.08, BLUE],
      ];
      const SOLID_BLUE = [[1.00, WHITE], [0.92, BLUE]];
      const SOLID_TAN  = [[1.00, WHITE], [0.92, TAN]];

      const R = 95;
      const COL = R;
      const ROW = R * 0.9;
      const PATTERN_COLS = 12;
      const PATTERN_ROWS = 8;
      const SCROLL_X = COL * PATTERN_COLS;
      const SCROLL_Y = ROW * PATTERN_ROWS;

      // Tunnel constants
      const GATE_COUNT         = 20;
      const GATE_TRAVEL_MS     = 900;   // how long each gate takes to zoom past
      const GATE_SPAWN_MS      = 130;   // gap between each gate spawning
      const GATE_CENTER_X      = 500;
      const GATE_VANISH_Y      = 660;   // fixed spawn Y (no moving the vanishing point)
      const TUNNEL_REMOVE_MS   = 1850;

      // --- Canvas torii renderer ---
      const toriiCanvas = document.getElementById("torii-canvas");
      const toriiCtx = toriiCanvas.getContext("2d");

      // Gate shape as Path2D objects (ported from original SVG paths)
      // SVG coordinate space: viewBox 0 0 1000 1000, gate centered at -320 -565
      const GATE_PARTS = [
        { path: new Path2D("M72 166 C160 190 480 190 568 166 L555 205 C430 229 210 229 85 205 Z"), fill: "#171919" },
        { path: new Path2D("M82 175 C180 198 460 198 558 175 L551 190 C434 214 206 214 89 190 Z"), fill: "#242526" },
        { path: new Path2D("M70 164 C178 184 462 184 570 164 L574 176 C440 200 200 200 66 176 Z"), fill: "#111313" },
        { path: new Path2D("M95 194 C214 215 426 215 545 194 L536 222 C422 238 218 238 104 222 Z"), fill: "#e32917" },
        { path: new Path2D("M105 222 H535 L528 246 H112 Z"), fill: "#c91513" },
        { path: new Path2D("M180 176 C245 189 395 189 460 176 V204 C382 217 258 217 180 204 Z"), fill: "#ef3218" },
        { rect: [274, 214, 92, 72],  fill: "#151617" },
        { rect: [274, 286, 92, 43],  fill: "#d51c15" },
        { rect: [116, 281, 408, 30], fill: "#c72a1e" },
        { rect: [126, 246, 40, 36],  fill: "#e12d1b" },
        { rect: [213, 244, 32, 39],  fill: "#e12d1b" },
        { rect: [395, 244, 32, 39],  fill: "#e12d1b" },
        { rect: [474, 246, 40, 36],  fill: "#e12d1b" },
        { rect: [182, 311, 32, 237], fill: "#d93823" },
        { rect: [426, 311, 32, 237], fill: "#d93823" },
        { rect: [214, 311, 10, 237], fill: "#a92720", alpha: 0.45 },
        { rect: [416, 311, 10, 237], fill: "#a92720", alpha: 0.45 },
        { rect: [176, 548, 48, 18],  fill: "#111313" },
        { rect: [416, 548, 48, 18],  fill: "#111313" },
      ];

      function drawGateShape(ctx, gateOpacity) {
        for (const p of GATE_PARTS) {
          ctx.globalAlpha = gateOpacity * (p.alpha ?? 1);
          ctx.fillStyle = p.fill;
          if (p.path) {
            ctx.fill(p.path);
          } else {
            ctx.fillRect(p.rect[0], p.rect[1], p.rect[2], p.rect[3]);
          }
        }
      }

      function resizeToriiCanvas() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        // Use CSS pixel size only — no DPR scaling to avoid accumulation bugs
        if (toriiCanvas.width !== w || toriiCanvas.height !== h) {
          toriiCanvas.width  = w;
          toriiCanvas.height = h;
        }
      }

      function easeInExpoish(t) {
        return t * t * (2.45 - 1.45 * t);
      }

      function mod(n, m) {
        return ((n % m) + m) % m;
      }

      let gateStart = 0;
      let introStarted = false;
      let tunnelVisible = true;

      function drawOneGate(svgX, svgY, scale, opacity) {
        toriiCtx.save();
        toriiCtx.translate(svgX, svgY);
        toriiCtx.scale(scale, scale);
        toriiCtx.translate(-320, -565);
        drawGateShape(toriiCtx, opacity);
        toriiCtx.restore();
      }

      function drawGateRun(elapsed) {
        const cw = window.innerWidth;
        const ch = window.innerHeight;
        toriiCtx.clearRect(0, 0, cw, ch);

        if (!tunnelVisible) return;

        // Map SVG viewBox (0 0 1000 1000) with xMidYMid slice onto screen
        const svgScale   = Math.max(cw / 1000, ch / 1000);
        const svgOffsetX = (cw - 1000 * svgScale) / 2;
        const svgOffsetY = (ch - 1000 * svgScale) / 2;

        toriiCtx.save();
        toriiCtx.translate(svgOffsetX, svgOffsetY);
        toriiCtx.scale(svgScale, svgScale);

        if (!introStarted) {
          // Show a single static gate as the "portal to enter" visual
          drawOneGate(GATE_CENTER_X, GATE_VANISH_Y, 0.55, 1);
          toriiCtx.restore();
          return;
        }

        const visible = [];

        for (let i = 0; i < GATE_COUNT; i++) {
          const startAt = i * GATE_SPAWN_MS;
          const runAge  = elapsed - startAt;
          if (runAge < 0) continue;

          const phase    = mod(runAge / GATE_TRAVEL_MS, 1);
          const zoom     = easeInExpoish(phase);
          const scale    = 0.55 + zoom * 7.9;
          const y        = GATE_VANISH_Y - zoom * 170;
          const x        = GATE_CENTER_X + Math.sin((phase + i * 0.13) * Math.PI * 2) * 4 * zoom;

          // Quick pop-in, graceful pop-out
          const farFade  = Math.min(1, phase / 0.06);
          const nearFade = phase > 0.86 ? Math.max(0, (1 - phase) / 0.14) : 1;
          const opacity  = farFade * nearFade;
          if (opacity <= 0.01) continue;

          visible.push({ phase, opacity, x, y, scale });
        }

        // Draw back-to-front (no DOM manipulation needed)
        visible.sort((a, b) => a.phase - b.phase);
        for (const g of visible) drawOneGate(g.x, g.y, g.scale, g.opacity);

        toriiCtx.restore();
      }

      function animateGateRun(now) {
        if (!gateStart) gateStart = now;
        const elapsed = introStarted ? now - gateStart : 0;
        resizeToriiCanvas();
        drawGateRun(elapsed);
        requestAnimationFrame(animateGateRun);
      }

      function pickRecipe(rowIndex, colIndex) {
        const r    = mod(rowIndex, PATTERN_ROWS);
        const c    = mod(colIndex, PATTERN_COLS);
        const roll = (r * 17 + c * 31 + r * c * 7) % 100;
        if (roll < 10) return SOLID_TAN;
        if (roll < 21) return SOLID_BLUE;
        return RINGED_BLUE;
      }

      function el(name, attrs) {
        const node = document.createElementNS(SVG_NS, name);
        for (const k in attrs) node.setAttribute(k, attrs[k]);
        return node;
      }

      function build() {
        while (stage.firstChild) stage.removeChild(stage.firstChild);
        const w = window.innerWidth;
        const h = window.innerHeight;
        stage.setAttribute("width", w);
        stage.setAttribute("height", h);
        stage.setAttribute("viewBox", `0 0 ${w} ${h}`);

        const frag  = document.createDocumentFragment();
        const sheet = el("g", {
          id: "sheet",
          style: `--scroll-x: ${SCROLL_X}px; --scroll-y: ${SCROLL_Y}px;`,
        });

        const startRow = -PATTERN_ROWS - 3;
        const endRow   = Math.ceil(h / ROW) + 3;
        const startCol = -PATTERN_COLS - 3;
        const endCol   = Math.ceil(w / COL) + 3;

        for (let rowIndex = startRow; rowIndex <= endRow; rowIndex++) {
          const cy     = rowIndex * ROW;
          const offset = mod(rowIndex, 2) * (COL / 2);
          for (let colIndex = startCol; colIndex <= endCol; colIndex++) {
            const x       = colIndex * COL + offset;
            const recipe  = pickRecipe(rowIndex, colIndex);
            const bobDelay    = -((rowIndex * 0.22 + colIndex * 0.09) % 3.8).toFixed(2);
            const bobDuration = (3.4 + mod(rowIndex + colIndex, 5) * 0.18).toFixed(2);
            const g = el("g", {
              class: "wave",
              style: `--bob-delay: ${bobDelay}s; --bob-duration: ${bobDuration}s;`,
            });
            for (const [frac, color] of recipe) {
              g.appendChild(el("circle", { cx: x, cy: cy, r: (R * frac).toFixed(2), fill: color }));
            }
            const overlay = el("g", { class: "ov" });
            for (const [frac, color] of recipe) {
              overlay.appendChild(el("circle", {
                cx: x, cy: cy,
                r: (R * frac).toFixed(2),
                fill: color === WHITE ? WHITE : RED,
              }));
            }
            g.appendChild(overlay);
            sheet.appendChild(g);
          }
        }
        frag.appendChild(sheet);
        stage.appendChild(frag);
      }

      function trigger(g) {
        if (!g) return;
        if (g._t) clearTimeout(g._t);
        g.classList.add("is-hit");
        g._t = setTimeout(() => { g.classList.remove("is-hit"); g._t = null; }, 1500);
      }

      let isDown = false;
      let lastG  = null;

      stage.addEventListener("pointerdown", (e) => {
        isDown = true;
        lastG  = e.target.closest(".wave");
        trigger(lastG);
      });
      stage.addEventListener("pointermove", (e) => {
        if (!isDown) return;
        const el2 = document.elementFromPoint(e.clientX, e.clientY);
        const g   = el2 && el2.closest(".wave");
        if (g && g !== lastG) { lastG = g; trigger(g); }
      });
      const endDrag = () => { isDown = false; lastG = null; };
      window.addEventListener("pointerup", endDrag);
      window.addEventListener("pointercancel", endDrag);

      build();
      requestAnimationFrame(animateGateRun);

      function startIntro() {
        if (introStarted) return;
        introStarted = true;
        gateStart    = performance.now();
        document.body.classList.add("started");

        setTimeout(() => {
          tunnelVisible = false;
          toriiCtx.clearRect(0, 0, toriiCanvas.width, toriiCanvas.height);
          // Navigate to the game after flying through the gates
          window.location.href = "game.html";
        }, TUNNEL_REMOVE_MS);
      }

      startPrompt.addEventListener("click", startIntro);
      document.getElementById("back-to-garden2").addEventListener("click", () => {
        window.location.href = "game.html?garden=2";
      });

      let rt;
      window.addEventListener("resize", () => { clearTimeout(rt); rt = setTimeout(build, 150); });
    })();
  </script>
</body>
</html>
